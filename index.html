<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Velvet Song Recommender</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Red Velvet <span>Recommender</span></h1>
            <p class="subtitle">당신의 기분에 맞는 레드벨벳의 노래를 찾아보세요.</p>
        </header>

        <main>
            <section class="controls">
                <div class="concept-buttons">
                    <button id="btn-red" class="btn btn-red">Red (상큼발랄)</button>
                    <button id="btn-velvet" class="btn btn-velvet">Velvet (고혹우아)</button>
                </div>
                
                <div class="input-group">
                    <input type="text" id="user-song-input" placeholder="좋아하는 노래 제목을 입력하세요 (예: Hype Boy)">
                    <button id="btn-similar" class="btn btn-secondary">비슷한 곡 추천!</button>
                </div>

                <button id="btn-random" class="btn btn-primary">랜덤 추천 받기!</button>
            </section>

            <!-- Loading Spinner -->
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>노래 정보를 분석 중입니다...</p>
            </div>

            <section id="recommendation-result" class="result-area hidden">
                <!-- User's Search Summary -->
                <div id="search-summary" class="search-summary hidden">
                    <div class="searched-song-info">
                        <img id="searched-art" src="" alt="Album Art">
                        <div class="searched-text">
                            <p class="label">당신이 선택한 곡</p>
                            <p id="searched-title" class="title"></p>
                            <p id="searched-genre" class="genre"></p>
                        </div>
                    </div>
                    <div class="arrow">▼</div>
                </div>

                <div class="song-card">
                    <div class="song-info">
                        <p class="rec-label">추천 레드벨벳 노래</p>
                        <h2 id="song-title">Song Title</h2>
                        <p id="song-album" class="album-name">Album Name</p>
                        <p id="song-vibe" class="vibe-tag">Red / Velvet</p>
                        <p id="song-desc" class="description">이 곡은 이런 분위기에요.</p>
                    </div>
                </div>
            </section>

            <section class="partnership">
                <h3>제휴 문의</h3>
                <p>레드벨벳 추천 서비스와 함께하고 싶으신가요?</p>
                <form id="contact-form" class="contact-form">
                    <div class="form-row">
                        <input type="text" name="name" placeholder="성함 또는 기업명" required>
                        <input type="email" name="email" placeholder="이메일 주소" required>
                    </div>
                    <textarea name="message" placeholder="문의 내용을 입력해 주세요" required></textarea>
                    <button type="submit" id="submit-btn" class="btn btn-primary">문의하기</button>
                    <p id="form-status" class="form-status hidden"></p>
                </form>
            </section>

            <section class="comments">
                <h3>Fan Community</h3>
                <p>레베럽 여러분의 의견을 남겨주세요!</p>
                <div id="disqus_thread"></div>
                <script>
                    (function() { 
                    var d = document, s = d.createElement('script');
                    s.src = 'https://redvelvetsong-recommend.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Red Velvet Song Recommender. ReVeLuv Forever.</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
